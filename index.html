/* Extra compact invoice modal */
.modal-advanced{display:none;grid-column:1/-1;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.modal-advanced.open{display:grid}
.modal-toggle{grid-column:1/-1;border:1px solid var(--line);background:transparent;color:var(--muted);height:30px;border-radius:10px;font-weight:900;font-size:12px;cursor:pointer}
@media(max-width:900px){
  .modal-backdrop{align-items:center;padding:6px}
  .modal-card{max-height:94dvh;overflow:hidden;padding:10px;border-radius:18px}
  .modal-head{margin-bottom:6px}
  .modal-head h3{font-size:16px}
  .modal-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}
  .modal-field label{font-size:9px;margin-bottom:2px}
  .modal-field input,.modal-field select{min-height:30px;height:30px;border-radius:9px;font-size:13px;padding:0 7px}
  .modal-field textarea{min-height:30px;height:30px;border-radius:9px;font-size:13px;padding:6px 7px}
  .modal-total{padding:7px;border-radius:11px}

  .modal-total b{font-size:16px}
  .modal-actions{margin-top:7px;gap:6px}
  .modal-actions .small-btn,.modal-actions .ghost-btn{height:32px;font-size:12px;border-radius:10px}
}

.trend-chart{
  position:relative;
  height:180px;
  border-radius:18px;
  overflow:hidden;
  background:
    linear-gradient(180deg,rgba(37,99,235,.12),rgba(37,99,235,.02)),
    repeating-linear-gradient(0deg,transparent 0 42px,var(--line) 43px);
}
.trend-chart svg{position:absolute;inset:0;width:100%;height:100%}
.trend-empty{
  height:180px;
  display:grid;
  place-items:center;
  color:var(--muted);
  font-weight:900;
  border-radius:18px;
  background:var(--bg);
}
.trend-label{
  position:absolute;
  right:10px;
  top:8px;
  z-index:2;
  font-size:11px;
  color:var(--muted);
  font-weight:900;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:999px;
  padding:4px 8px;
}
@media(max-width:900px){
  .trend-chart,.trend-empty{height:150px!important}
}
@media(max-width:430px){
  .trend-chart,.trend-empty{height:140px!important}
}


.iva-donut-wrap{display:grid;place-items:center;gap:10px}
.iva-legend{width:100%;display:grid;gap:7px;font-size:12px;font-weight:800;color:var(--muted)}
.iva-legend div{display:flex;justify-content:space-between;gap:10px}
.iva-dot{width:10px;height:10px;border-radius:999px;display:inline-block;margin-right:6px}


/* Formula info tips */
.info-btn{
  border:0;
  background:rgba(37,99,235,.10);
  color:#2563eb;
  width:22px;
  height:22px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  cursor:pointer;
  display:inline-grid;
  place-items:center;
  margin-left:6px;
  vertical-align:middle;
}
[data-theme="dark"] .info-btn{background:rgba(96,165,250,.18);color:#93c5fd}
.formula-backdrop{
  position:fixed;
  inset:0;
  z-index:120;
  background:rgba(15,23,42,.48);
  backdrop-filter:blur(8px);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding:16px;
}
.formula-card{
  width:min(520px,100%);
  background:var(--card);
  color:var(--text);
  border:1px solid var(--line);
  border-radius:24px;
  box-shadow:0 28px 70px rgba(15,23,42,.35);
  padding:18px;
}
.formula-card h3{margin:0 0 12px;font-size:18px}
.formula-line{
  display:flex;
  justify-content:space-between;
  gap:14px;
  padding:9px 0;
  border-bottom:1px solid var(--line);
  font-weight:800;
}
.formula-line span{color:var(--muted)}
.formula-result{
  margin-top:12px;
  padding:12px;
  border-radius:16px;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  color:#fff;
  display:flex;
  justify-content:space-between;
  font-weight:900;
}
.formula-note{
  margin-top:10px;
  font-size:12px;
  color:var(--muted);
  line-height:1.45;
  font-weight:700;
}
@media(max-width:700px){
  .formula-backdrop{padding:0;align-items:flex-end}
  .formula-card{border-radius:24px 24px 0 0;padding:16px}
  .formula-line{font-size:13px;padding:8px 0}
  .info-btn{width:20px;height:20px;font-size:11px}
}

function trendData(period=state.period){
  const ch=Object.values(state.data.chiusure||{})
    .filter(x=>x&&x.data&&inPeriod(x.data,period))
    .sort((a,b)=>(a.data||'').localeCompare(b.data||''));
  return ch.map(x=>({date:x.data,total:num(x.totale)}));
}
function trendChartHTML(period=state.period){
  const data=trendData(period);
  if(!data.length)return `<div class="trend-empty">${tx('暂无数据')}</div>`;
  const w=700,h=180,pad=26;
  const max=Math.max(...data.map(x=>x.total),1);
  const min=Math.min(...data.map(x=>x.total),0);
  const range=Math.max(max-min,1);
  const pts=data.map((d,i)=>{
    const x=data.length===1?w/2:pad+i*(w-2*pad)/(data.length-1);
    const y=h-pad-((d.total-min)/range)*(h-2*pad);
    return {x,y,...d};
  });
  const line=pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const area=`${line} ${pts[pts.length-1].x.toFixed(1)},${h-pad} ${pts[0].x.toFixed(1)},${h-pad}`;
  const dots=pts.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4.2" fill="#2563eb" stroke="#fff" stroke-width="2"><title>${p.date} · ${money(p.total)}</title></circle>`).join('');
  const first=data[0].date.slice(5),last=data[data.length-1].date.slice(5);
  return `<div class="trend-chart"><span class="trend-label">${first}${first!==last?' → '+last:''}</span><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="trendFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2563eb" stop-opacity=".26"/><stop offset="100%" stop-color="#2563eb" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${area}" fill="url(#trendFill)"></polygon>
    <polyline points="${line}" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></polyline>
    ${dots}
  </svg></div>`;
}


function ivaPieHTML(s){
  const sales=num(s.salesIva),fatt=num(s.fattureIva),due=num(s.gap);
  const total=Math.max(sales, fatt+due, 1);
  const fattPct=Math.min(100, Math.max(0, fatt/total*100));
  const duePct=Math.min(100, Math.max(0, due/total*100));
  const bg=sales<=0&&fatt<=0&&due<=0
    ? 'conic-gradient(#e5e7eb 0 100%)'
    : `conic-gradient(#16a34a 0 ${fattPct}%, #f97316 ${fattPct}% ${Math.min(100,fattPct+duePct)}%, #e5e7eb ${Math.min(100,fattPct+duePct)}% 100%)`;
  return `<div class="iva-donut-wrap">
    <div class="donut" style="background:${bg}" data-label="${money(due)}"></div>
    <div class="iva-legend">
      <div><span><i class="iva-dot" style="background:#16a34a"></i>${tx('发票IVA')}</span><b>${money(fatt)}</b></div>
      <div><span><i class="iva-dot" style="background:#f97316"></i>${tx('要付多少IVA')}</span><b>${money(due)}</b></div>
      <div><span><i class="iva-dot" style="background:#e5e7eb"></i>${tx('营业额IVA')}</span><b>${money(sales)}</b></div>

}

function downloadCSV(rows,filename){
  const csv=rows.map(r=>r.map(x=>'"'+String(x??'').replaceAll('"','""')+'"').join(';')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
}
